name: Build And Upload
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ai-java is multi-module: the consumable library artifact is the :jvm module (it re-exports
      # :routing + :accounts via api and shades them into its standalone jar). Build its jars, then
      # publish them as a github-gradle PACKAGE via publishGithub — this creates the release and
      # uploads ai-java.jar / ai-java-standalone.jar (named from jvm/build.gradle's owner/repo), which
      # is what `githubApi "intisy-ai:ai-java:<version>"` consumers resolve. publishGithub is scoped
      # to :jvm by the root build's onlyIf guard. GITHUB_TOKEN is what the github{} extension reads.
      - name: Build and publish :jvm as a github-gradle package
        run: ./gradlew :jvm:build :jvm:shadowJar publishGithub -Partifact_version=${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          GH_TOKEN: ${{ secrets.PAT }}
