name: Sync Experimental to Main

# Merge the working branch (experimental) into main (the release branch) ONLY when a release tag is
# pushed — the same trigger as build.yml (which publishes the jar). A plain push to experimental just
# runs tests (test.yml); it does NOT touch main. So the flow is: push experimental freely to save
# work + run CI, then push a tag to release (merge experimental->main + publish + regenerate README).
# README.md conflicts are auto-resolved to main's copy because readme-dependency regenerates it on
# every release, so experimental's copy is never authoritative.
on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and Checkout Main
        run: |
          git fetch origin
          git checkout main

      - name: Merge Experimental into Main
        run: |
          if ! git merge --no-ff origin/experimental -m "Automated merge from experimental to main"; then
            echo "Merge conflict detected, auto-resolving README.md to main's copy..."
            git checkout main -- README.md 2>/dev/null || git rm README.md 2>/dev/null || true
            git add -A
            git commit --no-edit
          fi

      - name: Push Changes
        run: git push origin main
