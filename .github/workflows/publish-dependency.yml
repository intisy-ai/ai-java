name: Publish Dependency
on:
  push:
    tags:
      - "*"
permissions:
  contents: write
# ai-java is a MULTI-MODULE repo with git submodules (core-proxy, core-auth), so it cannot use the
# shared reusable intisy/workflows publish-dependency (that checkout has no submodules + installs
# JDK 8, so :jvm fails to compile). This inline job mirrors build.yml's environment (recursive
# submodule checkout + JDK 17) and runs the Gradle publish lifecycle; the root build scopes
# `publishGithub` to :jvm (the only consumable artifact), so `publish` publishes just the library.
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish :jvm dependency artifact
        run: ./gradlew publish -Partifact_version=${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          GH_TOKEN: ${{ secrets.PAT }}
